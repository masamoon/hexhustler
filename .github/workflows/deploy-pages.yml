name: Deploy Godot Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.5.1
  GODOT_RELEASE: stable
  GODOT_BIN: Godot_v4.5.1-stable_linux.x86_64
  EXPORT_PRESET: Web
  EXPORT_PATH: build/web/index.html

jobs:
  export-web:
    name: Export Web Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          release="${GODOT_VERSION}-${GODOT_RELEASE}"
          base_url="https://github.com/godotengine/godot-builds/releases/download/${release}"

          curl -L "${base_url}/Godot_v${release}_linux.x86_64.zip" -o godot.zip
          unzip -q godot.zip
          chmod +x "${GODOT_BIN}"
          sudo mv "${GODOT_BIN}" /usr/local/bin/godot

          curl -L "${base_url}/Godot_v${release}_export_templates.tpz" -o export_templates.tpz
          unzip -q export_templates.tpz
          mkdir -p "${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          mv templates/* "${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/"

      - name: Export Web
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${EXPORT_PATH}")"
          godot --headless --path . --export-release "${EXPORT_PRESET}" "${EXPORT_PATH}"
          touch build/web/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: export-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
